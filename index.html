<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosy AI — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #FDFAF7;
    color: #1A1209;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 24px;
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: #1A1209;
    letter-spacing: -0.5px;
  }

  .coming-soon {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #FFF0E8;
    color: #C44E12;
    border: 1px solid rgba(232, 96, 26, 0.2);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #E8601A;
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .tagline {
    font-size: 16px;
    color: #6B5E52;
    font-weight: 300;
  }

  .contact {
    font-size: 14px;
    color: #9E8E82;
  }

  .contact a {
    color: #E8601A;
    text-decoration: none;
  }

  .contact a:hover { text-decoration: underline; }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    font-size: 11px;
    color: #B0A498;
    text-align: center;
    padding: 16px 24px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="page">
  <div class="wordmark">Cosy AI</div>
  <div class="coming-soon">
    <div class="dot"></div>
    Coming soon
  </div>
  <p class="tagline">Something exciting is on its way.</p>
  <p class="contact">Get in touch: <a href="mailto:hello@getcosy.ai">hello@getcosy.ai</a></p>
</div>

<footer>
  Cosy AI Pty Ltd &nbsp;·&nbsp; ABN 49 693 481 524 &nbsp;·&nbsp; Brisbane, Australia
</footer>

</body>
</html>
